## Structure: outermost layer is survey (e.g., DES, LSST, ROMAN, etc.) Inner layer indicates data file type (e.g., DUMP, SIM, DATA).
# The subscript indicates the SN type (e.g., IA, CC, etc.) ALL indicates a mixture of SN types.

FIT_OPTIONS:
  RATE_FUNCTION: power_law
SDSS:
  FIT_OPTIONS:
    RATE_FUNC: power_law
    RATE_PARAMS: 2.27E-5, 1.7
    Z_BINS: 8 # 8
    MIN_Z: 0.05 # 0.05
    MAX_Z: 0.40
    CC_ARE_SEPARATE: false
    F_NORM: 0.0416666
# Masao doesn't make these cuts in the SDSS paper, should I not?
  CUTS:
    x1: -3, 3
    c: -0.3, 0.3
    FITPROB: 0.001, 1000
    #PKMJDERR: 0, 2
  DUMP_ALL:
    PATH: /scratch/midway2/rkessler/PIPPIN_OUTPUT/CFM-SDSS-JH8/1_SIM/SDSS_BCOR/PIP_CFM-SDSS-JH8_SDSS_BCOR/PIP_CFM-SDSS-JH8_SDSS_BCOR.DUMP.gz
    ZCOL: GENZ
    SNTYPECOL: GENTYPE
    IA_VALS:
      - 1
    # Rick said to always use zHD
  SIM_ALL:
    PATH: /scratch/midway2/rkessler/PIPPIN_OUTPUT/CFM-SDSS-JH8/5_MERGE/MERGE_SDSSFIT_SDSS_BCOR/output/PIP_CFM-SDSS-JH8_SDSS_BCOR/FITOPT000.FITRES.gz
    ZCOL: zHD
    SNTYPECOL: SIM_GENTYPE
    IA_VALS:
      - 1
  DATA_ALL:
    #PATH: /scratch/midway2/rkessler/PIPPIN_OUTPUT/CFM-SDSS-JH8/5_MERGE/MERGE_SDSSFIT_SDSS/output/PIP_CFM-SDSS-JH8_SDSS-000*/FITOPT000.FITRES.gz
    PATH: /scratch/midway2/rkessler/PIPPIN_OUTPUT/CFM-SDSS-JH8/5_MERGE/MERGE_SDSSFIT_DATASDSS/output/SDSS_allCandidates+BOSS/FITOPT000.FITRES.gz
    ZCOL: zHD


